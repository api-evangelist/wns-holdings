description: WNS (Holdings) Ltd. does not publish a public API or rate-limit documentation. Any API rate limits applicable to a WNS-delivered solution are governed by the master services agreement signed with WNS, not by a public throttling policy.
sources:
  - https://www.wns.com/contact-us
notes: No public rate-limit documentation exists. Scaffolded numeric tiers (free/professional/enterprise per-minute and per-month limits) have been removed to avoid fabricated values; a single contract-scoped placeholder is retained.
responseCodes: {}
limits:
  - name: Contract-Scoped Rate Limits
    scope: contract
    metric: varies
    limit: defined per WNS master services agreement; not publicly documented
    notes: Throughput, concurrency, and quotas are negotiated as part of the engagement and surfaced in the contractual SLA rather than on a public limits page.
policies:
  - name: Contractual Governance
    description: Throttling, fair-use, and recovery rules are governed by the WNS master services agreement; clients should refer to their engagement contract and account team for operational limits.
