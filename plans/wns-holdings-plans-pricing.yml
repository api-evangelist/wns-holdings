description: WNS (Holdings) Ltd. is a global business process management and analytics services firm; it does not publish a self-serve developer API or public pricing page. Engagements are sold as custom outsourcing contracts negotiated directly with WNS; any API or data-product access is delivered inside those agreements rather than via published tiers.
