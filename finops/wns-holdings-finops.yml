description: FOCUS-aligned FinOps stub for WNS (Holdings) Ltd. WNS sells custom outsourcing and analytics engagements rather than a metered API; this artifact captures only the contractual shape and leaves quantitative meters undefined since no public billing surface exists.
sources:
  - https://www.wns.com/contact-us
notes: No public pricing or usage telemetry. Generic per-request, GB-egress, and compute-second meters from the scaffold have been removed; a single contractual meter is kept so consumers see WNS is governed by master services agreements rather than metered self-service.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: WNS (Holdings) Ltd.
serviceCategory: Business Process Outsourcing
billingModel:
  pricingCategory: Contract / Custom
  billingFrequency: Per-Invoice
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: WNS Engagement
  ServiceCategory: Business Process Outsourcing
  ProviderName: WNS Holdings
  PublisherName: WNS (Holdings) Ltd.
  InvoiceIssuerName: WNS (Holdings) Ltd.
  BillingCurrency: USD
meters:
  - name: contracted_engagement
    description: Negotiated outsourcing engagement; pricing, volume, and unit of measure are defined in the master services agreement.
    unit: varies
    aggregation: sum
    dimensions:
      - engagement
      - business_unit
principles:
  - name: Visibility
    description: Visibility is delivered through WNS-issued operational reports, dashboards, and quarterly business reviews tied to the engagement; there is no self-serve usage API to reconcile against.
  - name: Allocation
    description: Allocate WNS spend at the engagement / SOW level using internal cost-center tagging; line items map to the deliverables defined in the contract rather than to API calls.
  - name: Optimization
    description: Optimize via SOW renegotiation, scope adjustment, automation work delivered by WNS (e.g., RPA, analytics), and consolidation of overlapping engagements rather than via runtime knobs.
  - name: Accountability
    description: Accountability sits with the contract owner (typically procurement plus a business sponsor) who reviews invoices against the SOW and renews or restructures the engagement on contract milestones.
maintainers:
